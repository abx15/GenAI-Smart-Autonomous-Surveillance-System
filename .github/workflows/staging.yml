name: Staging Environment

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

env:
  STAGING_NAMESPACE: sass-staging

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}-frontend:staging-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Staging
        run: |
          echo "Deploying PR #${{ github.event.pull_request.number }} to staging"
          # Here you would deploy to your staging environment
          # This is a placeholder for staging deployment logic

  e2e-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          
      - name: Install Dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          
      - name: Wait for Staging Deployment
        run: |
          echo "Waiting for staging deployment to be ready..."
          sleep 30
          
      - name: Run E2E Tests
        run: |
          cd frontend
          # Placeholder for E2E tests
          echo "Running E2E tests against staging environment"
          # npx playwright test || true

  cleanup-staging:
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always() && github.event.pull_request.merged == false
    steps:
      - name: Cleanup Staging Environment
        run: |
          echo "Cleaning up staging environment for PR #${{ github.event.pull_request.number }}"
          # Cleanup staging resources here
