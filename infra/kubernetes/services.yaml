# Detection Service (Python/AI)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: detection-service
  namespace: sass-system
spec:
  replicas: 1 # Strictly 1 as per requirements (webcam/serial access)
  selector:
    matchLabels:
      app: detection-service
  template:
    metadata:
      labels:
        app: detection-service
    spec:
      containers:
      - name: detection-service
        image: ghcr.io/abx15/sass-detection-service:latest
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: sass-config
        - secretRef:
            name: sass-secrets
        resources:
          requests:
            cpu: 200m # Higher requests for CV
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
---
apiVersion: v1
kind: Service
metadata:
  name: detection-service-service
  namespace: sass-system
spec:
  selector:
    app: detection-service
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP
