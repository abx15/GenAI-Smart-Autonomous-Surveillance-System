apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sass-ingress
  namespace: sass-system
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - sass.local # Example domain
    secretName: sass-tls-secret
  rules:
  - host: sass.local
    http:
      paths:
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: api-gateway-service
            port:
              number: 4000
      - path: /dashboard(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend-service
            port:
              number: 3000
      - path: /stream(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: detection-service-service
            port:
              number: 5000
